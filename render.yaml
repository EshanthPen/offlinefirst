services:
  - type: web
    name: offlinefirst
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

# To enable persistent quiz scores after restart:
# 1. Upgrade this service to Starter ($7/mo) in the Render dashboard
